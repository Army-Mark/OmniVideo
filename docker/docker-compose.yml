services:
  mysql:
    image: mysql:8.0
    container_name: omni-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: omni_video
      MYSQL_CHARSET: utf8mb4
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: omni-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: omni-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  core-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.core-service
    container_name: omni-core-service
    ports:
      - "8000:8000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: omni_video
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DOWNLOAD_ENGINE_URL: http://download-engine:8080
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - downloads:/app/downloads
      - cache:/app/cache
    restart: unless-stopped

  download-engine:
    build:
      context: ..
      dockerfile: docker/Dockerfile.download-engine
    container_name: omni-download-engine
    ports:
      - "8080:8080"
    volumes:
      - downloads:/app/downloads
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: omni-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - core-service
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  minio_data:
  downloads:
  cache:
  frontend_dist:
